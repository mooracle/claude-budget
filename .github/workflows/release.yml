name: release

# Cross-target build runs on every push/PR (the GOOS/GOARCH build smoke test);
# artifacts are published to a GitHub release only on a `v*` tag.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Least privilege by default: only the release job needs write (it creates the
# GitHub release). check/build run on every PR and need read-only.
permissions:
  contents: read

jobs:
  check:
    name: vet + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go test ./...

  build:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: build
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          out="claude-budget-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags "-s -w" -o "$out" .
          echo "ARTIFACT=$out" >> "$GITHUB_ENV"
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: ${{ env.ARTIFACT }}

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
